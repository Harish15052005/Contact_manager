<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <title>Contact App</title>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">Contacts</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/about">About Me</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>


        <div class="container mb-3" style="width: 50%; margin-top: 1%;">

            <h2>
                Edit Contact
            </h2>            <form method="post" action="/edit_contact">
                <div class="mb-3 ">
                    <label for="name" class="form-label" >Name</label>
                    <input type="text" class="form-control" value="{{data.name}}" id="name" aria-describedby="emailHelp" name="name">
                </div>
                <div class="mb-3">
                    <label for="number" class="form-label">Number</label>
                    <input type="texts" class="form-control" value="{{data.number}}" id="number" name="number">
                </div>
                <div class="mb-3">
                    <label for="city" class="form-label" >City</label>
                    <input type="city" class="form-control" id="city" value="{{data.city}}" name="city">
                </div>
                <input type="hidden" value="{{id}}" name="_id">
                <button type="submit" class="btn btn-primary">Edit Contact</button>
            </form>
        </div>

      

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html></body></html>
